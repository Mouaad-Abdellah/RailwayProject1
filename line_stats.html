<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Line Statistics</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #9333ea, #fbcfe8); 
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #111827;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .line-card {
            background: rgba(255,255,255,0.95);
            margin: 20px auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            width: 80%;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .line-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.25);
        }

        .line-title {
            font-size: 20px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat {
            font-size: 16px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cheap {
            color: #16a34a;
            font-weight: bold;
        }

        .expensive {
            color: #dc2626;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            padding: 12px 24px;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover {
            background: linear-gradient(135deg, #1e40af, #7e22ce);
        }

        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

<h1>📈 Line Statistics</h1>

{% for r in results %}
    <div class="line-card">
        <div class="line-title">🚆 Line {{ r.line }}</div>
        <div class="stat cheap">
            <span class="icon">💰</span> Cheapest: {{ r.cheapest }} ({{ r.cheap_price }} DA)
        </div>
        <div class="stat expensive">
            <span class="icon">🔥</span> Most Expensive: {{ r.expensive }} ({{ r.exp_price }} DA)
        </div>
    </div>
{% endfor %}

<div style="text-align:center;">
    <a href="/">⬅ Back</a>
</div>

</body>
</html>
